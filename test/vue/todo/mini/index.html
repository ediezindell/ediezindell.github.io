<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
<div id="app">
  <transition-group name="list-complete" tag="ul">
    <li v-for="item in items" v-bind:key="item" class="list-complete-item">
      <label v-bind:class="{ done: item.isChecked }">
        <input type="checkbox" v-model="item.isChecked" v-on:change="saveTodo()"> {{ item.title }}
      </label>
    </li>
  </transition-group>
  <p>
    <input type="text" id="todoForm" placeholder="Input Todo Title" v-model="newItemTitle" v-on:keyup.enter="addTodo">
  </p>
  <button id="todoSubmit" v-on:click="deleteTodo()">チェック済みの項目を削除する</button>
</div>
<script src="https://unpkg.com/vue/dist/vue.js"></script>
<script src="./app.js"></script>
</body>
</html>
